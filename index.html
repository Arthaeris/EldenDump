<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1, viewport-fit=cover"
  />

  <meta name="theme-color" content="#111111" />

  <!-- iOS Home Screen support -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="EldenDump" />

  <title>EldenDump</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <button
    id="menuBtn"
    class="menu-toggle"
    aria-label="Open navigation">
    ☰
  </button>

  <aside id="menu" class="menu">
    <div class="menu-header">
      <h2>Navigation</h2>
      <button id="closeMenuBtn" class="secondary">✕</button>
    </div>

    <div class="menu-section">
      <button id="homeBtn" class="menu-item">🏠 Home</button>
    </div>

    <div class="menu-section">
      <h3>Dialogues</h3>
      <button id="npcIndexBtn" class="menu-item">
        NPC Index
      </button>
    </div>

    <div class="menu-section">
      <h3>Categories</h3>
      <div id="categoryList"></div>
    </div>
  </aside>

  <div id="menuOverlay" class="menu-overlay"></div>

  <header>
    <div class="header-row">
      <h1>EldenDump</h1>
    </div>

    <p>
      Search English and Japanese Elden Ring FMG entries, dialogue,
      item names, descriptions, locations, and system text.
    </p>
  </header>

  <main>

    <section id="searchView">

      <section id="searchFilters" class="search-filters">

  <div class="filter-group filter-group-all">
    <button class="filter-chip active" type="button" data-clear-filters>
      All
    </button>
  </div>

  <div class="filter-group">
    <span class="filter-label">Type</span>

    <div class="filter-row">
      <button class="filter-chip" type="button" data-type-filter="NPCs">NPCs</button>
      <button class="filter-chip" type="button" data-type-filter="Dialogues">Dialogues</button>
      <button class="filter-chip" type="button" data-type-filter="Locations">Locations</button>
      <button class="filter-chip" type="button" data-type-filter="Items">Items</button>
      <button class="filter-chip" type="button" data-type-filter="Weapons">Weapons</button>
      <button class="filter-chip" type="button" data-type-filter="Armor">Armor</button>
      <button class="filter-chip" type="button" data-type-filter="Talismans">Talismans</button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Flags</span>

    <div class="filter-row">
      <button class="filter-chip" type="button" data-flag-filter="Japanese-Exclusive">JP-only</button>
      <button class="filter-chip" type="button" data-flag-filter="DLC">DLC</button>
    </div>
  </div>

</section>

<section id="cardControls" class="card-controls">

  <div class="filter-group">
    <span class="filter-label">Language</span>

    <div class="filter-row">
      <button class="filter-chip active" type="button" data-language-mode="en">
        EN
      </button>

      <button class="filter-chip" type="button" data-language-mode="jp">
        JP
      </button>
    </div>
  </div>

  <div class="filter-group">
    <span class="filter-label">Format</span>

    <div class="filter-row">
      <button class="filter-chip active" type="button" data-card-mode="ids">
        IDs
      </button>

      <button class="filter-chip" type="button" data-card-mode="clean">
        Clean
      </button>

      <button class="filter-chip" type="button" data-card-mode="code">
        Code
      </button>
    </div>
  </div>

</section>

<section class="toolbar">
        <input
          id="search"
          type="search"
          placeholder="Search names, IDs, dialogue, descriptions..."
        />

        <span id="count">0 entries</span>
      </section>

      <button
        id="copySearchResultsBtn"
        class="secondary copy-search-btn"
        type="button">
        Copy all Search Results
      </button>

      <section
        id="results"
        class="results"
        aria-live="polite">
      </section>

    </section>

    <section id="categoryView" hidden>

      <div class="view-header">
        <button id="backFromCategoryBtn" class="secondary">
          ← Back
        </button>

        <h2 id="categoryTitle"></h2>
      </div>

      <section
        id="categoryResults"
        class="results">
      </section>

    </section>

    <section id="npcView" hidden>

      <div class="view-header">
        <button id="backFromNpcBtn" class="secondary">
          ← Back
        </button>

        <h2>Dialogues</h2>
      </div>

      <section
        id="npcList"
        class="results">
      </section>

    </section>

    <section id="dialogueView" hidden>

      <div class="view-header dialogue-view-header">
        <button id="backFromDialogueBtn" class="secondary">
          ← Back
        </button>

        <div class="dialogue-header">
          <h2 id="dialogueTitle"></h2>

          <button
            id="dialogueModeBtn"
            class="secondary dialogue-mode-btn">
            Full Dialogue
          </button>
        </div>
      </div>

      <section
        id="dialogueResults"
        class="results">
      </section>

    </section>

  </main>

  <footer>
    <span>Works offline after first load.</span>
  </footer>

  <script src="./app.js"></script>

</body>
</html>
