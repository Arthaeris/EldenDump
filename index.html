<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />

  <title>EldenDump</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>EldenDump</h1>
    <p>
      Search all Elden Ring FMG entries, dialogue, item names,
      descriptions, locations, and system text.
    </p>
  </header>

  <main>
    <section class="toolbar">
      <input
        id="search"
        type="search"
        placeholder="Search names, IDs, dialogue, descriptions..."
      />
      <span id="count">0 entries</span>
    </section>

    <section
      id="results"
      class="results"
      aria-live="polite">
    </section>
  </main>

  <footer>
    <span>Works offline after first load.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
