<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#111111" />

  <title>EldenDump</title>

  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <button
    id="menuBtn"
    class="menu-toggle"
    aria-label="Open navigation">
    ☰
  </button>

  <aside id="menu" class="menu">
    <div class="menu-header">
      <h2>Navigation</h2>
      <button id="closeMenuBtn" class="secondary">✕</button>
    </div>

    <div class="menu-section">
      <button id="homeBtn" class="menu-item">🏠 Home</button>
    </div>

    <div class="menu-section">
      <h3>Dialogues</h3>
      <button id="npcIndexBtn" class="menu-item">
        NPC Index
      </button>
    </div>

    <div class="menu-section">
      <h3>Categories</h3>
      <div id="categoryList"></div>
    </div>

  </aside>

  <div id="menuOverlay" class="menu-overlay"></div>

  <header>

    <div class="header-row">
      <h1>EldenDump</h1>
    </div>

    <p>
      Search English and Japanese Elden Ring FMG entries, dialogue,
      item names, descriptions, locations, and system text.
    </p>

  </header>

  <main>

    <section id="searchView">

      <section class="toolbar">
        <input
          id="search"
          type="search"
          placeholder="Search names, IDs, dialogue, descriptions..."
        />
        <span id="count">0 entries</span>
      </section>

      <section
        id="results"
        class="results"
        aria-live="polite">
      </section>

    </section>

    <section id="categoryView" hidden>

      <div class="view-header">
        <button id="backFromCategoryBtn" class="secondary">
          ← Back
        </button>

        <h2 id="categoryTitle"></h2>
      </div>

      <section
        id="categoryResults"
        class="results">
      </section>

    </section>

    <section id="npcView" hidden>

      <div class="view-header">
        <button id="backFromNpcBtn" class="secondary">
          ← Back
        </button>

        <h2>Dialogues</h2>
      </div>

      <section
        id="npcList"
        class="results">
      </section>

    </section>

    <section id="dialogueView" hidden>

      <div class="view-header">
        <button id="backFromDialogueBtn" class="secondary">
          ← Back
        </button>

        <h2 id="dialogueTitle"></h2>
      </div>

      <section
        id="dialogueResults"
        class="results">
      </section>

    </section>

  </main>

  <footer>
    <span>Works offline after first load.</span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
